<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Vincent Hiribarren - Curriculum Vitae</title>
    <noscript>
        <meta http-equiv="refresh" content="0;url=en/">
    </noscript>
    <script>
        (() => {
            const userLangs = navigator.languages || [navigator.language];
            let redirectTo = 'en/';
            for (const lang of userLangs) {
                const current = lang.toLowerCase();
                if (current.startsWith('fr')) {
                    redirectTo = 'fr/';
                    break;
                }
                if (current.startsWith('en')) {
                    break;
                }
            }
            window.location.replace(redirectTo);
        })();
    </script>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: #f7f5f0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: #475569;
        }

        .redirect-msg {
            text-align: center;
        }

        .redirect-msg a {
            color: #2563eb;
            text-decoration: none;
            font-weight: bold;
        }
    </style>
</head>

<body>
    <div class="redirect-msg">
        <p>Redirecting to your preferred language...</p>
        <p>
            <a href="en/">English CV</a> | <a href="fr/">CV Français</a>
        </p>
    </div>
</body>

</html>
